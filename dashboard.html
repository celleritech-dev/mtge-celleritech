<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard MTGE – Panel de Control | LOPDP Ecuador</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>
  <style>
/* Dashboard MTGE - Estilos Completos */

:root {
    --primary: #2563eb;
    --primary-dark: #1e40af;
    --secondary: #64748b;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --info: #3b82f6;
    
    --bg-main: #f8fafc;
    --bg-card: #ffffff;
    --border: #e2e8f0;
    --text-primary: #1e293b;
    --text-secondary: #64748b;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg-main);
    color: var(--text-primary);
    line-height: 1.6;
}

.dashboard-container {
    display: flex;
    min-height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
    color: white;
    display: flex;
    flex-direction: column;
    position: fixed;
    height: 100vh;
    overflow-y: auto;
    box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
}

.logo {
    padding: 30px 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.logo h2 {
    font-size: 1.5rem;
    margin-bottom: 5px;
}

.logo p {
    font-size: 0.9rem;
    opacity: 0.7;
}

.nav-menu {
    flex: 1;
    padding: 20px 0;
}

.nav-item {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    color: rgba(255, 255, 255, 0.7);
    text-decoration: none;
    transition: all 0.3s;
    cursor: pointer;
}

.nav-item:hover {
    background: rgba(255, 255, 255, 0.05);
    color: white;
}

.nav-item.active {
    background: rgba(37, 99, 235, 0.2);
    color: white;
    border-left: 3px solid var(--primary);
}

.nav-item .icon {
    font-size: 1.3rem;
    margin-right: 12px;
    width: 24px;
}

.sidebar-footer {
    padding: 20px;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.btn-new-treatment,
.btn-import {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}

.btn-new-treatment:hover {
    background: var(--primary-dark);
    transform: translateY(-2px);
}

.btn-import {
    background: transparent;
    border: 2px solid rgba(255, 255, 255, 0.2);
}

.btn-import:hover {
    border-color: white;
}

/* Main Content */
.main-content {
    flex: 1;
    margin-left: 260px;
    padding: 0;
}

.dashboard-header {
    background: white;
    padding: 20px 30px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
}

.header-left h1 {
    font-size: 1.75rem;
    color: var(--text-primary);
    margin-bottom: 5px;
}

.breadcrumb {
    color: var(--text-secondary);
    font-size: 0.9rem;
}

.header-right {
    display: flex;
    gap: 15px;
    align-items: center;
}

.date-filter {
    display: flex;
    align-items: center;
    gap: 10px;
}

.date-filter label {
    font-weight: 600;
    color: var(--text-secondary);
}

.date-filter select {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.9rem;
}

.btn-refresh {
    padding: 10px 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
}

.btn-refresh:hover {
    background: var(--primary-dark);
}

/* Content Sections */
.content-section {
    padding: 30px;
    display: none;
}

.content-section.active {
    display: block;
}

/* KPI Cards */
.kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.kpi-card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    gap: 15px;
    box-shadow: var(--shadow);
    transition: all 0.3s;
}

.kpi-card:hover {
    transform: translateY(-5px);
    box-shadow: var(--shadow-lg);
}

.kpi-icon {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
}

.kpi-content {
    flex: 1;
}

.kpi-label {
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-bottom: 5px;
}

.kpi-value {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 5px;
}

.kpi-trend {
    font-size: 0.85rem;
    font-weight: 600;
}

.kpi-trend.positive {
    color: var(--success);
}

.kpi-trend.negative {
    color: var(--danger);
}

.kpi-trend.neutral {
    color: var(--text-secondary);
}

/* Charts Grid */
.charts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.chart-card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--shadow);
}

.chart-card.chart-wide {
    grid-column: 1 / -1;
}

.chart-card.chart-full {
    grid-column: 1 / -1;
}

.chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.chart-header h3 {
    font-size: 1.1rem;
    color: var(--text-primary);
}

.chart-subtitle {
    font-size: 0.85rem;
    color: var(--text-secondary);
    margin-top: 5px;
}

.btn-icon {
    background: transparent;
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s;
}

.btn-icon:hover {
    background: var(--bg-main);
}

/* Alerts Section */
.alerts-section {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 30px;
}

.alerts-section h3 {
    margin-bottom: 15px;
}

.alerts-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.alert {
    padding: 15px;
    border-radius: 8px;
    border-left: 4px solid;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.alert.alert-danger {
    background: #fef2f2;
    border-color: var(--danger);
}

.alert.alert-warning {
    background: #fffbeb;
    border-color: var(--warning);
}

.alert.alert-info {
    background: #eff6ff;
    border-color: var(--info);
}

.alert-content h4 {
    font-size: 0.95rem;
    margin-bottom: 5px;
}

.alert-content p {
    font-size: 0.85rem;
    color: var(--text-secondary);
}

/* Table Styles */
.table-controls {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 15px;
    flex-wrap: wrap;
}

.search-box input {
    padding: 10px 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 300px;
    font-size: 0.9rem;
}

.filter-group {
    display: flex;
    gap: 10px;
}

.filter-group select {
    padding: 10px 15px;
    border: 1px solid var(--border);
    border-radius: 8px;
}

.btn-export {
    padding: 10px 20px;
    background: var(--success);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}

.table-container {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: var(--bg-main);
}

th {
    padding: 15px;
    text-align: left;
    font-weight: 600;
    color: var(--text-primary);
    cursor: pointer;
    user-select: none;
}

th:hover {
    background: var(--border);
}

td {
    padding: 15px;
    border-bottom: 1px solid var(--border);
}

tbody tr:hover {
    background: var(--bg-main);
}

.badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
}

.badge.gran-escala {
    background: #fee2e2;
    color: #dc2626;
}

.badge.no-gran-escala {
    background: #d1fae5;
    color: #059669;
}

.btn-action {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    margin-right: 5px;
    transition: all 0.3s;
}

.btn-view {
    background: var(--info);
    color: white;
}

.btn-edit {
    background: var(--warning);
    color: white;
}

.btn-delete {
    background: var(--danger);
    color: white;
}

/* Analytics Grid */
.analytics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

/* Comparison Section */
.comparison-section {
    background: white;
    border-radius: 12px;
    padding: 25px;
    box-shadow: var(--shadow);
    margin-top: 30px;
}

.comparison-controls {
    display: flex;
    align-items: center;
    gap: 15px;
    margin: 20px 0;
}

.comparison-controls select {
    flex: 1;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
}

.vs-label {
    font-weight: 700;
    color: var(--primary);
    font-size: 1.2rem;
}

.comparison-result {
    margin-top: 20px;
    padding: 20px;
    background: var(--bg-main);
    border-radius: 8px;
}

.placeholder-text {
    text-align: center;
    color: var(--text-secondary);
    padding: 40px;
}

/* Compliance Section */
.compliance-overview {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.compliance-card {
    background: white;
    border-radius: 12px;
    padding: 25px;
    box-shadow: var(--shadow);
    text-align: center;
}

.compliance-card h3 {
    margin-bottom: 20px;
    font-size: 1.1rem;
}

.compliance-stat {
    display: flex;
    flex-direction: column;
}

.stat-number {
    font-size: 3rem;
    font-weight: 700;
    color: var(--primary);
    line-height: 1;
}

.stat-label {
    font-size: 0.9rem;
    color: var(--text-secondary);
    margin-top: 10px;
}

.compliance-details,
.timeline-section {
    background: white;
    border-radius: 12px;
    padding: 25px;
    box-shadow: var(--shadow);
    margin-bottom: 30px;
}

.obligations-list {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
}

.obligation-item {
    padding: 15px;
    background: var(--bg-main);
    border-radius: 8px;
    border-left: 4px solid var(--primary);
}

/* Risk Matrix */
.risk-matrix {
    background: white;
    border-radius: 12px;
    padding: 25px;
    box-shadow: var(--shadow);
    margin-bottom: 30px;
}

.risk-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-top: 20px;
}

.risk-cell {
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    border: 2px solid;
}

.risk-cell h4 {
    margin-bottom: 15px;
}

.risk-count {
    font-size: 3rem;
    font-weight: 700;
    display: block;
    margin-bottom: 5px;
}

.risk-high {
    background: #fef2f2;
    border-color: var(--danger);
    color: var(--danger);
}

.risk-medium {
    background: #fffbeb;
    border-color: var(--warning);
    color: var(--warning);
}

.risk-low {
    background: #d1fae5;
    border-color: var(--success);
    color: var(--success);
}

.recommendations {
    background: white;
    border-radius: 12px;
    padding: 25px;
    box-shadow: var(--shadow);
    margin-top: 30px;
}

/* Reports Section */
.reports-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
}

.report-card {
    background: white;
    border-radius: 12px;
    padding: 30px;
    box-shadow: var(--shadow);
    text-align: center;
    transition: all 0.3s;
}

.report-card:hover {
    transform: translateY(-5px);
    box-shadow: var(--shadow-lg);
}

.report-icon {
    font-size: 3rem;
    margin-bottom: 15px;
}

.report-card h3 {
    margin-bottom: 10px;
}

.report-card p {
    color: var(--text-secondary);
    margin-bottom: 20px;
    font-size: 0.9rem;
}

.btn-generate {
    padding: 12px 24px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
}

.btn-generate:hover {
    background: var(--primary-dark);
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    animation: fadeIn 0.3s;
}

.modal-content {
    background: white;
    margin: 5% auto;
    padding: 30px;
    border-radius: 12px;
    width: 80%;
    max-width: 800px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideDown 0.3s;
}

.close {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
}

.close:hover {
    color: #000;
}

/* Animations */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideDown {
    from {
        transform: translateY(-50px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

/* Pagination */
.pagination {
    display: flex;
    justify-content: center;
    gap: 5px;
    margin-top: 20px;
}

.pagination button {
    padding: 8px 12px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 6px;
    cursor: pointer;
}

.pagination button.active {
    background: var(--primary);
    color: white;
}

/* Responsive */
@media (max-width: 768px) {
    .sidebar {
        width: 70px;
    }

    .main-content {
        margin-left: 70px;
    }

    .logo p,
    .nav-item span:not(.icon) {
        display: none;
    }

    .sidebar-footer button {
        padding: 10px;
        font-size: 1.2rem;
    }

    .charts-grid,
    .analytics-grid {
        grid-template-columns: 1fr;
    }

    .dashboard-header {
        flex-direction: column;
        gap: 15px;
    }
}

/* Extra: botón volver al formulario */
.btn-back-form {
  display:inline-block;margin:0 0 0 10px;padding:8px 16px;
  background:rgba(255,255,255,.15);color:#fff;text-decoration:none;
  border-radius:8px;border:1px solid rgba(255,255,255,.4);font-weight:600;font-size:.85rem;
}
.btn-back-form:hover{background:rgba(255,255,255,.3);}
  </style>
</head>
<body>
  <div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <h2>🛡️ MTGE</h2>
        <p>Panel de Control</p>
        <a href="index.html" class="btn-back-form">← Formulario</a>
      </div>
      <nav class="nav-menu">
        <a href="#" class="nav-item active" data-section="overview">
          <span class="icon">📊</span><span>Resumen General</span>
        </a>
        <a href="#" class="nav-item" data-section="treatments">
          <span class="icon">📋</span><span>Tratamientos</span>
        </a>
        <a href="#" class="nav-item" data-section="analytics">
          <span class="icon">📈</span><span>Análisis Detallado</span>
        </a>
        <a href="#" class="nav-item" data-section="compliance">
          <span class="icon">✅</span><span>Cumplimiento</span>
        </a>
        <a href="#" class="nav-item" data-section="risks">
          <span class="icon">⚠️</span><span>Gestión de Riesgos</span>
        </a>
        <a href="#" class="nav-item" data-section="reports">
          <span class="icon">📄</span><span>Reportes</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-new-treatment" onclick="window.location.href='index.html'">
          ➕ Nueva Evaluación
        </button>
        <button class="btn-import" onclick="importarDatos()">
          📥 Importar JSON
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="dashboard-header">
        <div class="header-left">
          <h1 id="sectionTitle">Resumen General</h1>
          <p class="breadcrumb">Dashboard / <span id="breadcrumb">Resumen</span></p>
        </div>
        <div class="header-right">
          <div class="date-filter">
            <label>Período:</label>
            <select id="periodFilter" onchange="filtrarPorPeriodo()">
              <option value="all">Todo</option>
              <option value="month">Último mes</option>
              <option value="quarter">Último trimestre</option>
              <option value="year" selected>Último año</option>
            </select>
          </div>
          <button class="btn-refresh" onclick="cargarDatos()">🔄 Actualizar</button>
        </div>
      </header>

      <!-- Overview -->
      <section id="overview-section" class="content-section active">
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-icon" style="background:#dbeafe;">📋</div>
            <div class="kpi-content">
              <p class="kpi-label">Total Tratamientos</p>
              <h3 class="kpi-value" id="totalTratamientos">0</h3>
              <span class="kpi-trend positive">Registrados en el RAT</span>
            </div>
          </div>
          <div class="kpi-card">
            <div class="kpi-icon" style="background:#fee2e2;">🚨</div>
            <div class="kpi-content">
              <p class="kpi-label">Gran Escala</p>
              <h3 class="kpi-value" id="granEscala">0</h3>
              <span class="kpi-trend neutral" id="granEscalaPct">0% del total</span>
            </div>
          </div>
          <div class="kpi-card">
            <div class="kpi-icon" style="background:#fef3c7;">⚖️</div>
            <div class="kpi-content">
              <p class="kpi-label">Puntuación Promedio</p>
              <h3 class="kpi-value" id="promedioScore">0</h3>
              <span class="kpi-trend neutral">Umbral: 6 puntos</span>
            </div>
          </div>
          <div class="kpi-card">
            <div class="kpi-icon" style="background:#d1fae5;">👥</div>
            <div class="kpi-content">
              <p class="kpi-label">Titulares Totales</p>
              <h3 class="kpi-value" id="totalTitulares">0</h3>
              <span class="kpi-trend positive">Personas afectadas</span>
            </div>
          </div>
        </div>
        <div class="charts-grid">
          <div class="chart-card">
            <div class="chart-header">
              <h3>Distribución por Clasificación</h3>
              <button class="btn-icon" onclick="descargarGrafico('clasificacionChart')">⬇️</button>
            </div>
            <canvas id="clasificacionChart"></canvas>
          </div>
          <div class="chart-card">
            <div class="chart-header">
              <h3>Distribución de Puntuaciones</h3>
              <button class="btn-icon" onclick="descargarGrafico('scoreDistChart')">⬇️</button>
            </div>
            <canvas id="scoreDistChart"></canvas>
          </div>
        </div>
        <div class="charts-grid">
          <div class="chart-card chart-wide">
            <div class="chart-header">
              <h3>Evolución de Tratamientos por Mes</h3>
              <button class="btn-icon" onclick="descargarGrafico('evolucionChart')">⬇️</button>
            </div>
            <canvas id="evolucionChart"></canvas>
          </div>
          <div class="chart-card">
            <div class="chart-header">
              <h3>Variables Críticas (Promedio)</h3>
              <button class="btn-icon" onclick="descargarGrafico('variablesChart')">⬇️</button>
            </div>
            <canvas id="variablesChart"></canvas>
          </div>
        </div>
        <div class="alerts-section">
          <h3>⚠️ Alertas y Recomendaciones</h3>
          <div id="alertsContainer" class="alerts-container"></div>
        </div>
      </section>

      <!-- Treatments -->
      <section id="treatments-section" class="content-section">
        <div class="table-controls">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Buscar tratamiento..."
                   onkeyup="filtrarTabla()">
          </div>

    const promedioScore = (tratamientosData.reduce((sum, t) => sum + t.puntaje, 0) / total).toFixed(1);

    document.getElementById('totalTratamientos').textContent = total;
    document.getElementById('granEscala').textContent = granEscala;

    charts.scoreDist = new Chart(scoreDistCtx, {

// Funciones auxiliares de cálculo
function calcularPuntosTitulares(num) {
    if (num <= 1000) return 1;
    if (num <= 10000) return 2;
    if (num <= 100000) return 3;
    return 4;
}

function calcularPuntosVolumen(num) {
    if (num <= 10) return 0.5;
    if (num <= 30) return 1;
    if (num <= 100) return 2;
    return 3;
}

// Filtrar tabla
function filtrarTabla() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const clasificacion = document.getElementById('filterClasificacion').value;
    
    const filtered = tratamientosData.filter(t => {
        const matchSearch = t.nombre.toLowerCase().includes(searchTerm) || 
                          t.responsable.toLowerCase().includes(searchTerm);
        const matchClasif = !clasificacion || t.clasificacion === clasificacion;
        return matchSearch && matchClasif;
    });
    
    // Actualizar tabla con datos filtrados
    const tbody = document.getElementById('tratamientosTableBody');
    tbody.innerHTML = '';
    
    filtered.forEach(t => {
        const row = `

// Sort tabla
function sortTable(colIdx) {
  const tbody = document.getElementById('tratamientosTableBody');
  const rows  = Array.from(tbody.querySelectorAll('tr'));
  rows.sort((a, b) => {
    const aText = a.cells[colIdx]?.textContent?.trim() || '';
    const bText = b.cells[colIdx]?.textContent?.trim() || '';
    const aNum  = parseFloat(aText);
    const bNum  = parseFloat(bText);
    if (!isNaN(aNum) && !isNaN(bNum)) return aNum - bNum;
    return aText.localeCompare(bText);
  });
  rows.forEach(r => tbody.appendChild(r));
}

// eliminarTratamiento
function eliminarTratamiento(id) {
  if (!confirm('¿Eliminar este tratamiento del registro?')) return;
  tratamientosData = tratamientosData.filter(t => t.id !== id);
  // Si fue guardado en localStorage, actualizar
  const guardados = JSON.parse(localStorage.getItem('mtge_tratamientos') || '[]')
                      .filter(t => t.id !== id);
  localStorage.setItem('mtge_tratamientos', JSON.stringify(guardados));
  cargarDatos();
}

// exportar tabla CSV
function exportarTabla() {
  const rows = [['Nombre','Responsable','Fecha','Puntuación','Clasificación','Titulares']];
  tratamientosData.forEach(t => rows.push([t.nombre,t.responsable,t.fecha,t.puntaje,t.clasificacion,t.titulares]));
  const csv = rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='mtge_tratamientos.csv'; a.click();
  URL.revokeObjectURL(url);
}
